<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>403 - 접근 권한 없음</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .navbar { background: linear-gradient(90deg, #1a1a2e, #0f3460); }
        .navbar-brand { font-weight: 800; color: #e94560 !important; font-size: 1.4rem; }
        .error-card { border: none; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,.08); }
        .error-code { font-size: 4rem; font-weight: 800; color: #e94560; line-height: 1; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark mb-4">
    <div class="container">
        <a class="navbar-brand" th:href="@{/home}">HanSung</a>
        <ul class="navbar-nav me-auto">
            <li class="nav-item"><a class="nav-link" th:href="@{/products}">상품 목록</a></li>
        </ul>
        <form th:action="@{/logout}" method="post" class="d-flex">
            <button class="btn btn-outline-light btn-sm px-3">로그아웃</button>
        </form>
    </div>
</nav>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-7">
            <div class="card error-card text-center p-5">
                <div class="error-code mb-2">403</div>
                <h4 class="fw-bold mb-2">접근 권한이 없습니다.</h4>
                <p class="text-muted mb-4">상품 수정 기능은 관리자(ROLE_ADMIN) 권한을 가진 사용자만 접근할 수 있습니다.</p>
                <div class="d-flex gap-2 justify-content-center">
                    <a th:href="@{/home}" class="btn btn-danger px-4">홈으로</a>
                    <a th:href="@{/products}" class="btn btn-outline-secondary px-4">상품 목록</a>
                </div>
            </div>
        </div>
    </div>

    <footer th:replace="~{fragments/footer :: footer}"></footer>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
